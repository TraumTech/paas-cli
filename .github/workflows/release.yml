name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # Dogfooding: после релиза PaaS фиксирует версию paas-cli самим собой (VER-02) и
  # регистрирует зависимости этой версии из манифеста (PRT-05/CLI-15) — CLI тоже
  # реальный потребитель контракта. Сервис и состав зависимостей берёт из protocols.toml.
  PAAS_API: https://api.paas.traumtech.ru

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go test ./...
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Отдельный job (идемпотентный), чтобы публикацию можно было перезапустить
  # независимо от релиза через «Re-run failed jobs».
  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Установить paas-cli
        run: |
          curl -fsSL "${PAAS_API}/cli/install.sh" | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Зафиксировать версию в PaaS
        id: version
        # Публикация версии идемпотентна (одна ревизия = одна версия): при «Re-run»
        # вернётся та же версия с тем же id. Этот id адресует зависимость.
        run: |
          version_id=$(paas-cli versions publish "${{ github.sha }}")
          echo "id=${version_id}" >> "$GITHUB_OUTPUT"
      - name: Зарегистрировать зависимости версии из манифеста
        # Регистрируем весь состав зависимостей из protocols.toml одной командой
        # (CLI-15). paas-cli потребляет одну актуальную версию контракта, поэтому
        # --prune (CLI-16): регистрируемая версия замещает зависимости прошлых версий —
        # платформа снимает их атомарно с регистрацией (PRT-12). Отдельный шаг снятия
        # (curl+jq) больше не нужен. Идемпотентно: повторный прогон — та же одна связь.
        run: paas-cli dependencies register --prune "${{ steps.version.outputs.id }}"
