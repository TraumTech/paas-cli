version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: paas-cli
    main: ./cmd/paas-cli
    binary: paas-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/TraumTech/paas-cli/internal/app.Version={{ .Version }}

archives:
  - id: paas-cli
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: TraumTech
    name: paas-cli
