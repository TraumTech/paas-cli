# protocols.toml — контракты сервисов платформы, от которых зависит этот репозиторий.
# paas-cli читает этот файл и тянет все перечисленные контракты одной командой
# в <destination>/<service-name>/openapi.json. Снимки коммитятся — они и есть lock
# (воспроизводимость даёт git, а не пин на версию продьюсера).

# destination опционально (по умолчанию "protocols"):
# destination = "protocols"

# Зависимости — массив объектов; name — имя сервиса-продьюсера (папка protocols/<name>/).
[[dependencies]]
name = "paas-backend"  # продьюсер, на контракте которого собран клиент платформы
